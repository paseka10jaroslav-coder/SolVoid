name: Freelance Auto Bot

on:
  schedule:
    # Běží každých 10 minut (limity: max 1x za 5 min)
    - cron: '*/10 * * * *'
  workflow_dispatch:  # Možnost spustit manuálně
  push:  # Spustí se při změně kódu

jobs:
  monitor-freelance:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Install Chrome for Selenium
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser chromium-chromedriver
        
    - name: Run bot
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        UPWORK_USERNAME: ${{ secrets.UPWORK_USERNAME }}
        UPWORK_PASSWORD: ${{ secrets.UPWORK_PASSWORD }}
      run: python main.py
      
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: bot-logs
        path: logs/
